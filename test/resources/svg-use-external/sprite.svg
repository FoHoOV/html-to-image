<svg xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paint">
      <stop offset="0" stop-color="red" />
      <stop offset="1" stop-color="blue" />
    </linearGradient>
    <symbol id="icon" viewBox="0 0 20 20">
      <rect width="20" height="20" fill="url(#paint)" />
    </symbol>
  </defs>
</svg>
